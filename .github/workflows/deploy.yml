name: Build and Deploy

on:
  push:
    branches: [ main ]  # Runs every time you push to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 
        run: npm install

      - name: Build Project 
        run: npm run build
        # Note: Ensure your 'build' script outputs to 'dist' or 'build'

      - name: Deploy to GitHub Pages 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the build script generates
          branch: gh-pages # The branch the action will deploy to